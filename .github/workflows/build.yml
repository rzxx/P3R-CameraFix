name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Replace version placeholder
        shell: pwsh
        run: |
          $content = Get-Content -Path "ModConfig.json" -Raw
          $content = $content.Replace("<REPLACED_VERSION_IN_CI>", $env:VERSION)
          Set-Content -Path "ModConfig.json" -Value $content -NoNewline

      - name: Publish
        run: dotnet publish -c Release -p:OutputPath=./publish

      - name: Copy ModConfig
        shell: pwsh
        run: Copy-Item -Path "ModConfig.json" -Destination "publish/ModConfig.json"

      - name: Package
        shell: pwsh
        working-directory: publish
        run: Compress-Archive -Path * -DestinationPath ../P3R-CameraFix.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: P3R-CameraFix.zip
